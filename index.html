<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/sohyp220-coder/WolfStyle@main/WolfStyle.css">
    <style type="text/css" media="all">
        body {
            background: pink;
        }
        .card-container {
            width: 80%;
            margin-left: 3px;
            border: 2px solid #D00076;
            box-shadow: 3px 3px 3px 1px #F14FAA;
        }
        .card-container:has(.container) {
            transform: translateY(-100%);
        }
        .card-container  .btn-p  {
            width: 90%;
            height: 30px;
            border: 3px solid #E94FF1;
            border-radius: 10px;
        }
        .card-container .btn-S {
            transform: translateX(105%);
            padding: 5px;
            border: 3px solid #B862E9;
            border-radius: 10px;
        }
        .card-container .btn:hover {
            box-shadow: 0 0 1px 5px #33D7FF;
            background: lightyellow;
            color: darkcyan;
            outline: 0;
        }
        .cont {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .cont2 {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            font-size: 25px;
            font-family: sans-serif;
            font-weight: bold;
            color: #FF32A6;
        }
        .loading {
            display: none;
            width: 30px;
            height: 30px;
            border: 5px #E3E3E3 solid;
            border-right: #FF4BC4 solid 5px;
            border-radius: 50%;
            animation: spin infinite 1s ease;
            transition: 1s;
            
        }
        .l {
            display: none;
            font-size: 13px;
            font-weight: 20px;
            font-family: 'Times New Roman', Times, sans-serif;
        }
        @keyframes spin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }
    </style>
    <title>Case Creater</title>
</head>
<body>
    <div class="cont2">
        <span>sr_sr Cases</span>
    </div>
  <div class="card-container">


      <input type="text" class="btn btn-p" placeholder="enter your phone type" id="phoneType">
      <br>
      <br>
      <input type="file" name="" id="" class="btn btn-p" style="width: 200px;">
      <br><br>
      <button class="btn btn-S">CREATE</button>
  </div>
  <div class="cont">
    <div class="loading"></div>
    <div class="l">creating your style please wait ...</div>
  </div>
  <canvas id="canvas">
      
  </canvas>
  <div class="card-container">
      <div class="container" style="display: flex;justify-content: center;"> <span>CONTACT</span>  </div>
      <span>WhatsApp</span>
      <a href="https://wa.me/20 1099276379">01099276379</a>
  </div>
  <script type="text/javascript" charset="utf-8" src="script.js">
  </script>
</body>
</html>
